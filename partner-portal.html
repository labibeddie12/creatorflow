<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="icon" href="./favicon.svg"><title>CreatorFlow Partner Portal</title><style>:root{--ink:#171717;--paper:#f4f0e7;--white:#fffdf8;--coral:#f0542d;--blue:#2448d8;--muted:#706960;--line:#c9c1b4}*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font-family:Arial,sans-serif}button,input,select,textarea{font:inherit}[hidden]{display:none!important}.shell{width:min(1080px,calc(100% - 30px));margin:auto}.nav{height:72px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line)}.brand{font-weight:950;text-decoration:none;color:var(--ink)}.brand span{color:var(--coral)}.nav a:not(.brand),.nav button{border:1px solid var(--line);padding:9px 12px;background:transparent;color:var(--ink);text-decoration:none;font-size:10px;font-weight:900}.auth{min-height:calc(100vh - 72px);display:grid;place-items:center;padding:30px}.card{width:min(460px,100%);background:var(--white);border:1px solid var(--ink);box-shadow:10px 10px 0 var(--blue);padding:30px}.kicker{font-size:9px;font-weight:900;letter-spacing:.17em;text-transform:uppercase;color:var(--coral)}h1{font-size:42px;letter-spacing:-.05em;margin:10px 0}p{color:var(--muted);line-height:1.6}label{display:grid;gap:6px;font-size:10px;font-weight:900;text-transform:uppercase;margin:12px 0}input,select,textarea{width:100%;padding:12px;border:1px solid var(--line);background:#fff}.primary{width:100%;border:0;background:var(--coral);color:#fff;padding:14px;font-weight:900;cursor:pointer}.google{width:100%;padding:12px;background:#fff;border:1px solid var(--line);font-weight:900}.switch{border:0;background:none;color:var(--blue);font-weight:900}.error{background:#ffe5de;color:#a52f16;padding:10px;font-size:11px}.dashboard{padding:55px 0 90px}.head{display:flex;justify-content:space-between;align-items:end;gap:20px;margin-bottom:28px}.head h1{font-size:58px}.status{display:grid;grid-template-columns:.75fr 1.25fr;gap:18px}.panel{background:var(--white);border:1px solid var(--line);padding:24px}.badge{display:inline-block;padding:7px 10px;background:#e9e5dd;font-size:9px;font-weight:900;text-transform:uppercase}.badge.approved{background:#dff3e9;color:#176848}.badge.rejected{background:#ffe2dd;color:#a52f16}.project{background:var(--ink);color:#fff;padding:22px;margin-top:15px}.project p{color:#d0c8c0}.project-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}.project-grid div{border:1px solid #ffffff2e;padding:11px}.project-grid small{display:block;color:#aaa;margin-bottom:5px}.messages{max-height:260px;overflow:auto;border:1px solid var(--line);background:#fff;padding:10px;margin-top:12px}.message{padding:9px;margin:6px 0;background:#f0ece6;font-size:12px}.message.mine{background:#e8edff;margin-left:30px}.send{display:flex;gap:8px;margin-top:8px}.send button{width:auto}.application{display:grid;grid-template-columns:1fr 1fr;gap:10px}.application .full{grid-column:1/-1}.toast{position:fixed;right:20px;bottom:20px;background:var(--ink);color:#fff;padding:12px;z-index:9}@media(max-width:720px){.status{grid-template-columns:1fr}.head{display:block}.head h1{font-size:44px}.application,.project-grid{grid-template-columns:1fr}.application .full{grid-column:auto}.card{padding:22px;box-shadow:6px 6px 0 var(--blue)}.send{display:grid}}</style></head><body><nav class="nav shell"><a class="brand" href="./index.html">CREATOR<span>FLOW</span></a><div><a href="./partner.html">Partner page</a> <button id="logout" hidden>Sign out</button></div></nav><section class="auth" id="auth"><form class="card" id="auth-form"><span class="kicker">Partner access</span><h1 id="auth-title">Partner login.</h1><p>Track your application, assigned work and CreatorFlow messages.</p><div class="error" id="error" hidden></div><button type="button" class="google" id="google">Continue with Google</button><label>Full name<input name="name"></label><label>Email<input name="email" type="email" required></label><label>Password<input name="password" type="password" minlength="6" required></label><button class="primary" id="auth-submit">Sign in</button><p style="text-align:center"><span id="switch-copy">New partner?</span> <button type="button" class="switch" id="switch">Create account</button></p></form></section><main class="dashboard shell" id="dashboard" hidden><header class="head"><div><span class="kicker">CreatorFlow partner network</span><h1 id="welcome">Partner dashboard.</h1><p id="email"></p></div></header><div id="portal-content"></div></main><div class="toast" id="toast" hidden></div><script type="module">import{initializeApp}from"https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";import{getAuth,onAuthStateChanged,GoogleAuthProvider,signInWithPopup,signInWithEmailAndPassword,createUserWithEmailAndPassword,updateProfile,signOut}from"https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";import{getFirestore,collection,query,where,onSnapshot,addDoc,serverTimestamp}from"https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";const config={apiKey:"AIzaSyAX7aQr5bQNTeRMF3EiXhHzVdAUdouqfD8",authDomain:"creatorflow-2e633.firebaseapp.com",projectId:"creatorflow-2e633",storageBucket:"creatorflow-2e633.firebasestorage.app",messagingSenderId:"957859362731",appId:"1:957859362731:web:cc6e688950c279cf9104ee"},app=initializeApp(config),auth=getAuth(app),db=getFirestore(app),$=s=>document.querySelector(s),esc=v=>String(v??"").replace(/[&<>'"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[c]));let signup=false,user=null,application=null,unsubApp,unsubMessages;function toast(t){const x=$("#toast");x.textContent=t;x.hidden=false;setTimeout(()=>x.hidden=true,3000)}function authMode(){$("#auth-title").textContent=signup?"Join as a partner.":"Partner login.";$("#auth-submit").textContent=signup?"Create partner account":"Sign in";$("#switch-copy").textContent=signup?"Already registered?":"New partner?";$("#switch").textContent=signup?"Sign in":"Create account"}$("#switch").onclick=()=>{signup=!signup;authMode()};$("#auth-form").onsubmit=async e=>{e.preventDefault();const d=new FormData(e.currentTarget);try{const c=signup?await createUserWithEmailAndPassword(auth,String(d.get("email")),String(d.get("password"))):await signInWithEmailAndPassword(auth,String(d.get("email")),String(d.get("password")));if(signup&&d.get("name"))await updateProfile(c.user,{displayName:String(d.get("name"))})}catch(err){$("#error").textContent=err.message;$("#error").hidden=false}};$("#google").onclick=()=>signInWithPopup(auth,new GoogleAuthProvider()).catch(e=>{$("#error").textContent=e.message;$("#error").hidden=false});$("#logout").onclick=()=>signOut(auth);onAuthStateChanged(auth,u=>{user=u;$("#auth").hidden=!!u;$("#dashboard").hidden=!u;$("#logout").hidden=!u;if(!u){unsubApp?.();return}$("#welcome").textContent=`Hello${u.displayName?", "+u.displayName.split(" ")[0]:""}.`;$("#email").textContent=u.email||"";unsubApp?.();unsubApp=onSnapshot(query(collection(db,"partnerApplications"),where("userId","==",u.uid)),s=>{application=s.docs[0]?{id:s.docs[0].id,...s.docs[0].data()}:null;render()},e=>$("#portal-content").innerHTML=`<div class="panel">${esc(e.message)}</div>`)});function render(){unsubMessages?.();if(!application){$("#portal-content").innerHTML=`<section class="panel"><span class="kicker">Partner application</span><h2>Tell us what you can provide.</h2><form class="application" id="application-form"><label>Name<input name="name" required value="${esc(user.displayName||"")}"></label><label>Phone<input name="phone" required></label><label>City<input name="city" required></label><label>Role<select name="role" required><option>Video Editor</option><option>Cameraman / iPhone Shooter</option><option>Gear Provider</option><option>Studio Partner</option><option>Other Service</option></select></label><label class="full">Portfolio / social link<input name="portfolio" type="url"></label><label class="full">What can you provide?<textarea name="offering" rows="4" required></textarea></label><label>Availability<select name="availability"><option>Available now</option><option>Weekdays</option><option>Weekends</option><option>On request</option></select></label><label>Starting rate<input name="rate" placeholder="₹500/day"></label><label class="full">Anything else?<textarea name="message" rows="2"></textarea></label><button class="primary full">Submit application →</button></form></section>`;$("#application-form").onsubmit=submitApplication;return}const approved=application.status==="approved";$("#portal-content").innerHTML=`<div class="status"><section class="panel"><span class="kicker">Application status</span><h2>${esc(application.name)}</h2><span class="badge ${esc(application.status)}">${esc(application.status||"new")}</span><p><b>${esc(application.role)}</b><br>${esc(application.offering)}</p>${application.status==="new"?"<p>Your application is waiting for review.</p>":application.status==="contacted"?"<p>CreatorFlow may contact you for verification.</p>":application.status==="rejected"?`<p>${esc(application.adminNote||"Application was not approved right now.")}</p>`:"<p>You are approved for the CreatorFlow partner network.</p>"}</section><section class="panel"><span class="kicker">Assigned project</span>${approved&&application.projectTitle?`<div class="project"><h2>${esc(application.projectTitle)}</h2><p>${esc(application.projectBrief||"")}</p><div class="project-grid"><div><small>Status</small><b>${esc(application.projectStatus||"Assigned")}</b></div><div><small>Payment</small><b>${esc(application.projectPayment||"To be confirmed")}</b></div><div><small>Deadline</small><b>${application.projectDeadline?application.projectDeadline.toDate().toLocaleString("en-IN"):"Not set"}</b></div><div><small>Delivery</small><b>${application.projectDeliveryUrl?`<a style="color:white" target="_blank" href="${esc(application.projectDeliveryUrl)}">Open link ↗</a>`:"Not added"}</b></div></div></div>`:approved?"<p>No project assigned yet. We will update this area when suitable work is available.</p>":"<p>Projects and messaging unlock after approval.</p>"}${approved?'<h3>Messages</h3><div class="messages" id="messages"></div><div class="send"><input id="message-input" placeholder="Message CreatorFlow"><button class="primary" id="send">Send</button></div>':""}</section></div>`;if(approved){unsubMessages=onSnapshot(query(collection(db,"partnerMessages"),where("applicationId","==",application.id)),s=>renderMessages(s.docs.map(d=>d.data())),e=>renderMessages([{senderRole:"admin",text:e.message}]));$("#send").onclick=sendMessage}}async function submitApplication(e){e.preventDefault();const d=new FormData(e.currentTarget);try{await addDoc(collection(db,"partnerApplications"),{userId:user.uid,name:String(d.get("name")),phone:String(d.get("phone")),email:user.email||"",city:String(d.get("city")),role:String(d.get("role")),roleCategory:String(d.get("role")),portfolio:String(d.get("portfolio")||""),offering:String(d.get("offering")),availability:String(d.get("availability")),rate:String(d.get("rate")||""),message:String(d.get("message")||""),status:"new",createdAt:serverTimestamp()});toast("Application submitted")}catch(err){toast("Failed: "+err.message)}}function renderMessages(list){$("#messages").innerHTML=list.length?list.sort((a,b)=>(a.createdAt?.seconds||0)-(b.createdAt?.seconds||0)).map(m=>`<div class="message ${m.senderRole==="partner"?"mine":""}"><b>${m.senderRole==="partner"?"You":"CreatorFlow"}</b><br>${esc(m.text)}</div>`).join(""):"No messages yet."}async function sendMessage(){const input=$("#message-input"),text=input.value.trim();if(!text)return;try{await addDoc(collection(db,"partnerMessages"),{applicationId:application.id,userId:user.uid,senderId:user.uid,senderRole:"partner",text,createdAt:serverTimestamp()});input.value=""}catch(err){toast("Message failed: "+err.message)}}</script></body></html>
