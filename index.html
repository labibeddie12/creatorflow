<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CreatorFlow — editing, scripts, hooks, automation and creator growth services." />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg?v=2" />
    <title>CreatorFlow — Creator Growth Studio</title>
    <style>
      .production-alert{position:relative;z-index:40;display:flex;align-items:center;justify-content:center;gap:18px;min-height:46px;padding:9px 24px;background:#171717;color:#fffdf8;border-bottom:3px solid #f0542d;font-family:Arial,Helvetica,sans-serif}
      .production-alert__signal{display:inline-flex;align-items:center;gap:8px;color:#ff7958;font-size:10px;font-weight:900;letter-spacing:1.7px;text-transform:uppercase}
      .production-alert__signal:before{content:"";width:7px;height:7px;border-radius:50%;background:#45d18b;box-shadow:0 0 0 4px #45d18b22;animation:availabilityPulse 1.8s ease-in-out infinite}
      .production-alert__copy{font-size:12px;color:#d7d0c5}.production-alert__copy strong{color:#fffdf8}
      .production-alert__cta{display:inline-flex;align-items:center;gap:8px;padding:7px 11px;border:1px solid #ffffff42;border-radius:4px;color:#fffdf8;text-decoration:none;font-size:10px;font-weight:900;transition:.2s}
      .production-alert__cta:hover{background:#f0542d;border-color:#f0542d;transform:translateY(-1px)}
      @keyframes availabilityPulse{50%{opacity:.45;transform:scale(.8)}}
      @media(max-width:700px){.production-alert{justify-content:space-between;gap:10px;padding:9px 14px}.production-alert__signal{font-size:9px}.production-alert__copy{display:none}.production-alert__cta{font-size:9px;white-space:nowrap}}
      @media(prefers-reduced-motion:reduce){.production-alert__signal:before{animation:none}}
    </style>
    <script type="module" crossorigin src="./assets/index-BdypxKrS.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-CBz7QQWs.css">
  </head>
  <body>
    <aside class="production-alert" aria-label="Production services available">
      <span class="production-alert__signal">Available now</span>
      <span class="production-alert__copy"><strong>Shoot. Record. Create.</strong> Hire a cameraman or rent mics, lights and studio gear.</span>
      <a class="production-alert__cta" href="#production">Explore rentals <span aria-hidden="true">→</span></a>
    </aside>
    <div id="root"></div>
  </body>
</html>
